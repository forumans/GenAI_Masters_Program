version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: hr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hr_assistant_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: hr_chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hr_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://postgres:password@postgres:5432/hr_assistant_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      CHROMA_PERSIST_DIR: /app/chroma_data
      HR_POLICIES_PATH: /app/hr_policies/hr_policies.pdf
    volumes:
      - .:/app
      - ../hr_policies:/app/hr_policies:ro
      - chroma_data:/app/chroma_data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  chroma_data:
